<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>HomeLab Media - {{TITLE}}</title>
    <style>
        body { background: #111; color: white; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; margin: 0; padding: 30px; }
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px; padding-bottom: 10px; border-bottom: 1px solid #333; }
        h1 { color: #e50914; font-size: 22px; margin: 0; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        .path-info { color: #888; font-size: 14px; font-family: monospace; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }

        .card {
            background: #1a1a1a;
            border-radius: 6px;
            overflow: hidden;
            text-decoration: none;
            color: white;
            transition: all 0.2s ease-out;
            border: 1px solid #2a2a2a;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-5px);
            background: #252525;
            border-color: #e50914;
            box-shadow: 0 8px 25px rgba(0,0,0,0.6);
        }

        .thumb-box { width: 100%; height: 120px; background: #000; overflow: hidden; position: relative; }
        .thumb-box img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }
        .card:hover .thumb-box img { transform: scale(1.03); }

        .overlay {
            position: absolute; top:0; left:0; width:100%; height:100%;
            display:flex; align-items:center; justify-content:center;
            opacity: 0; transition: 0.2s; font-size: 30px;
        }
        .card:hover .overlay { opacity: 1; }

        .overlay.play { background: rgba(0,0,0,0.4); color: #e50914; }
        .overlay.zoom { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.8); backdrop-filter: blur(2px); }

        .info { padding: 10px; display: flex; align-items: center; gap: 8px; font-size: 13px; border-top: 1px solid #2a2a2a; }
        .icon { opacity: 0.7; }
        .name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; color: #ccc; }
        .card:hover .name { color: white; }

        .back-btn { color: #e50914; text-decoration: none; font-size: 14px; margin-bottom: 20px; display: inline-block; font-weight: bold;}
        .back-btn:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="header">
        <h1>HomeLab</h1>
        <div class="path-info">Index of /{{TITLE}}</div>
    </div>
    <a href="javascript:history.back()" class="back-btn">← НАЗАД</a>
    <div class="grid">
        {{GRID}}
    </div>
</body>
</html>
